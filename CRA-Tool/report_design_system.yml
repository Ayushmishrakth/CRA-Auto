branding:
  primary_color: "0078D4"
  secondary_color: "2F5496"
  accent_color: "00A4EF"
  dark_color: "1F2937"
  muted_color: "6B7280"
  light_band: "EBF4FD"
  success_color: "00B050"
  fail_color: "C00000"
  warning_color: "F79646"
  partner_logo: "app/services/reporting/assets/techplustalent-logo.png"

typography:
  heading_font: "Calibri Light"
  body_font: "Calibri"
  h1_size: 18
  h2_size: 14
  body_size: 11
  caption_size: 8

layout:
  top_margin: 0.68
  bottom_margin: 0.62
  left_margin: 0.72
  right_margin: 0.72
  chart_dpi: 220

severity_definitions:
  Critical:
    color: "C00000"
    description: "The risks posed by this finding are of a critical nature and can lead to full system compromise. Specifics should be addressed immediately."
  High:
    color: "FF0000"
    description: "The risks posed by this finding are of high impact and can lead to partial or full system compromise. Specifics should be addressed as soon as can be safely implemented."
  Medium:
    color: "ED7D31"
    description: "The risks posed by this finding is of moderate impact, existing controls may be providing partial mitigation. Remediation efforts should be planned as part of regular maintenance."
  Low:
    color: "FFC000"
    description: "The risk posed by this finding is low due to the potential impact or the difficulty of exploitation. Issues noted should be reviewed for remediation when convenient."
  Informational:
    color: "70AD47"
    description: "A potential indirect risk that may contribute to or lead to an incident or deviation from industry best practices."

readiness_thresholds:
  - label: "READY"
    min: 80
    color: "00B050"
  - label: "PARTIALLY READY"
    min: 50
    color: "F79646"
  - label: "NOT READY"
    min: 0
    color: "C00000"

chart_palette:
  pillars:
    - "4472C4"
    - "A5A5A5"
    - "ED7D31"
  services:
    - "4472C4"
    - "ED7D31"
    - "A5A5A5"
    - "FFC000"
    - "5B9BD5"
    - "70AD47"
  status:
    Pass: "00B050"
    Fail: "C00000"
